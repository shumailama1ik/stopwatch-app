<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    #parent{
        height: 100vh;
        background-color: #003C00;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    #child{
        display: flex;
        justify-content: center;
        align-self: center;
        height: 100%;
        gap: 40px;
    }
    .zero{
        font-size: 170px;
        color: white;
        width: 190px;
     }
    .text{
        font-size: 30px;
        color: rgb(184, 195, 164);
    }
     .btn{
        height: 70px;
        width: 160px;
        color: white;
        font-size: 35px;
        cursor: pointer;
        border: none;
        border-top-right-radius: 15px;
        border-bottom-left-radius: 15px;
        margin-top: -130px;
     }
     #child2{
    display: flex;
    justify-content: center;
    gap: 50px;
    }
     #btn1{
        background-color: red;
     }
     #btn2{
        background-color: blue;
     }
     #btn3{
        background-color: orange;
     }
     .ds{
        display: flex;
        align-items: baseline;
     }
     #text1{
        font-size: 50px;
        color: wheat;
        /* padding-top: 20px; */
     }
     
    </style>
</head>
<body>
 <div id="parent">
    <h1 id ="text1">Stop Watch</h1>
    <div id="child">
    <div class="ds">
        <p class="zero" id="hour">00</p>
        <p class="text" >Hr</p>
    </div>
    <div class="ds">
        <p class="zero" id="minute">00</p>
        <p class="text" >Min</p>
    </div>
    <div class="ds">
        <p class="zero" id="second">00</p>
        <p class="text" >Sec</p>
    </div>
    <div class="ds">
        <p class="zero" id="millisec">00</p>
        <p class="text" >M sec</p>
    </div>
    </div>
    <div id="child2">
    <button class="btn" id="btn1">Start</button>
    <button class="btn" id="btn2">Stop</button>
    <button class="btn" id="btn3">Reset</button>
    </div>
</div>
    <script>
        var sec = 0;
        var min = 0;
        var hr = 0;
        var ms = 0;
        var second = document.getElementById("second");
        var minute = document.getElementById("minute");
        var hour = document.getElementById("hour");
        var millisec = document.getElementById("millisec");
        var btn1 = document.getElementById("btn1");
        var a;
        btn1.addEventListener("click",()=>{
          a = setInterval(() => {
            ms++;
            if(sec==60){
                sec = 0;
                min++;
            }
            if(min==60){
                hr++;
                min = 0;
            }
            if(ms == 100){
                sec++;
                ms = 0;
            }
            document.getElementById("hour").innerHTML = hr;
            document.getElementById("minute").innerHTML = min;
            document.getElementById("second").innerHTML = sec;
            document.getElementById("millisec").innerHTML = ms;
            }, 10);
        })
        btn2.addEventListener("click",()=>{
         clearInterval(a);
        })
        btn3.addEventListener("click",()=>{
         clearInterval(a);
         sec = 0;
         min = 0;
         hr = 0;
         hour.innerHTML = "00";
         minute.innerHTML = "00";
         second.innerHTML = "00";
         millisec.innerHTML = "00";
        })




    </script>
</body>
</html>
